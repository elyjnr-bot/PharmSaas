<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bcd96e"/>
      <stop offset="50%" stop-color="#96c244"/>
      <stop offset="100%" stop-color="#74ab2e"/>
    </linearGradient>
  </defs>
  <!-- Fond arrondi vert dégradé -->
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>
  <!-- Astérisque 6 branches : 3 rectangles tournés 0° / 60° / 120° -->
  <g fill="#1a1a1a" transform="translate(256,256)">
    <rect x="-36" y="-155" width="72" height="310" rx="36"/>
    <rect x="-36" y="-155" width="72" height="310" rx="36" transform="rotate(60)"/>
    <rect x="-36" y="-155" width="72" height="310" rx="36" transform="rotate(120)"/>
  </g>
</svg>
